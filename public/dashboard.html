<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow, noarchive, nosnippet">
<title>Competitor Ad Intelligence — Google Ads Transparency</title>
<style>
:root{--bg:#0f1117;--card:#1a1d27;--border:#2a2d3a;--text:#e4e6eb;--muted:#8b8fa3;--accent:#6366f1;--accent-l:#818cf8;--green:#22c55e;--red:#ef4444;--yellow:#eab308;--blue:#3b82f6}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);line-height:1.5}
.container{max-width:1600px;margin:0 auto;padding:24px}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;flex-wrap:wrap;gap:16px}
.header h1{font-size:24px;font-weight:700} .header h1 span{color:var(--accent-l)}
.header .meta{color:var(--muted);font-size:13px}
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:24px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px}
.stat-card .label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px}
.stat-card .value{font-size:28px;font-weight:700} .stat-card .sub{font-size:11px;color:var(--muted);margin-top:1px}
.filters{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap;align-items:flex-end}
.filters label{font-size:12px;color:var(--muted);display:block;margin-bottom:3px}
.filters select,.filters input{background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:8px 12px;font-size:13px;outline:none}
.filters select:focus,.filters input:focus{border-color:var(--accent)} .filters input{width:200px}
.badge{display:inline-block;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:600;text-transform:uppercase}
.badge-video{background:rgba(239,68,68,.15);color:#f87171}
.badge-image{background:rgba(59,130,246,.15);color:#60a5fa}
.badge-text{background:rgba(234,179,8,.15);color:#facc15}
.badge-new{background:rgba(34,197,94,.12);color:var(--green)}
.badge-inactive{background:rgba(139,143,163,.12);color:#8b8fa3}
.badge-sa{background:rgba(34,197,94,.12);color:#4ade80}
.badge-ae{background:rgba(99,102,241,.12);color:#a5b4fc}
.view-toggle{display:flex;gap:4px;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:3px}
.view-toggle button{background:transparent;border:none;color:var(--muted);padding:6px 14px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:500}
.view-toggle button.active{background:var(--accent);color:#fff}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px}
.ad-card{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;transition:border-color .2s}
.ad-card:hover{border-color:var(--accent)}
.ad-card .media{width:100%;height:220px;background:#12141c;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;cursor:pointer}
.ad-card .media iframe{width:100%;height:100%;border:none}
.ad-card .media img{max-width:100%;max-height:100%;object-fit:contain}
.ad-card .media .no-preview{color:var(--muted);font-size:13px;text-align:center;padding:16px}
.ad-card .media video{max-width:100%;max-height:100%;object-fit:contain}
.lazy-spinner{width:24px;height:24px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto}
@keyframes spin{to{transform:rotate(360deg)}}
.play-overlay{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:48px;height:48px;background:rgba(0,0,0,.6);border-radius:50%;display:flex;align-items:center;justify-content:center;pointer-events:none}
.play-overlay::after{content:'';border-left:16px solid #fff;border-top:10px solid transparent;border-bottom:10px solid transparent;margin-left:4px}
.ad-card .info{padding:14px}
.ad-card .info .top-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.ad-card .info .competitor{font-weight:600;font-size:15px}
.ad-card .info .tags{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap}
.ad-card .info .details{font-size:12px;color:var(--muted);margin-top:6px}
.ad-card .info .details a{color:var(--accent-l);text-decoration:none} .ad-card .info .details a:hover{text-decoration:underline}
.breakdown{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;margin-bottom:24px}
.breakdown-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px}
.breakdown-card .name{font-weight:600;font-size:15px;margin-bottom:2px}
.breakdown-card .website{font-size:12px;color:var(--muted);margin-bottom:10px}
.breakdown-card .website a{color:var(--accent-l);text-decoration:none}
.breakdown-card .bar-row{display:flex;align-items:center;gap:8px;margin-bottom:5px;font-size:12px}
.breakdown-card .bar{flex:1;height:7px;background:#2a2d3a;border-radius:4px;overflow:hidden}
.breakdown-card .bar .fill{height:100%;border-radius:4px}
.bar-v .fill{background:var(--red)} .bar-i .fill{background:var(--blue)} .bar-t .fill{background:var(--yellow)}
.table-wrap{overflow-x:auto;background:var(--card);border:1px solid var(--border);border-radius:12px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:#12141c;padding:10px 12px;text-align:left;font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);border-bottom:1px solid var(--border);position:sticky;top:0;cursor:pointer;user-select:none;white-space:nowrap}
th:hover{color:var(--text)} td{padding:8px 12px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:hover td{background:rgba(99,102,241,.04)} td img.thumb{height:50px;border-radius:4px}
td a{color:var(--accent-l);text-decoration:none} td a:hover{text-decoration:underline}
.hidden{display:none!important}
h3.section{margin-bottom:10px;font-size:15px;font-weight:600}
@media(max-width:768px){.grid{grid-template-columns:1fr}.container{padding:12px}}

/* Lightbox */
.lightbox{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.85);z-index:1000;align-items:center;justify-content:center;cursor:zoom-out}
.lightbox.open{display:flex}
.lightbox img,.lightbox video{max-width:90%;max-height:90%;border-radius:8px}
.lightbox .close-btn{position:absolute;top:20px;right:24px;color:#fff;font-size:32px;cursor:pointer;background:none;border:none}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div><h1>Competitor <span>Ad Intelligence</span></h1><div class="meta">Google Ads & Meta Ads Library | SA, AE & Global</div></div>
    <div style="text-align:right">
      <div class="meta" id="lastUpdated"></div>
      <div style="margin-top:4px"><a href="/cost.html" style="color:var(--accent-l);text-decoration:none;font-size:12px">💰 Cost console →</a></div>
    </div>
  </div>
  <div class="stats-row" id="statsRow"></div>
  <div class="filters">
    <div><label>Category</label><select id="fCat"><option value="">All</option><option value="GCC">GCC</option><option value="Global">Global</option></select></div>
    <div><label>Competitor</label><select id="fComp"><option value="">All</option></select></div>
    <div><label>Region</label><select id="fReg"><option value="">All</option><option value="SA">SA</option><option value="AE">AE</option><option value="Global">Global</option></select></div>
    <div><label>Format</label><select id="fFmt"><option value="">All</option><option value="Video">Video</option><option value="Image">Image</option><option value="Text">Text</option></select></div>
    <div><label>Platform</label><select id="fPlat"><option value="">All</option><option value="Google Ads">Google Ads</option><option value="Meta Ads">Meta Ads</option><option value="LinkedIn Ads">LinkedIn Ads</option></select></div>
    <div><label>Status</label><select id="fStatus"><option value="">All</option><option value="Active" selected>Active</option><option value="Inactive">Inactive</option></select></div>
    <div><label>From</label><input type="date" id="fFrom"></div>
    <div><label>To</label><input type="date" id="fTo"></div>
    <div><label>Search</label><input type="text" id="fSearch" placeholder="Search ads..."></div>
    <div><label>&nbsp;</label><a href="/test-analyze.html" style="display:inline-flex;align-items:center;gap:6px;background:var(--accent);color:#fff;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;text-decoration:none;white-space:nowrap;transition:background .2s" onmouseover="this.style.background='var(--accent-l)'" onmouseout="this.style.background='var(--accent)'">AI Analysis</a></div>
    <div style="margin-left:auto"><label>View</label><div class="view-toggle"><button class="active" id="btnGrid">Grid</button><button id="btnTable">Table</button></div></div>
  </div>
  <div style="margin-bottom:12px;font-size:13px;color:var(--muted)">Showing <strong id="cnt" style="color:var(--text)">0</strong> ads</div>
  <div class="grid" id="gridView"></div>
  <div class="breakdown" id="breakdown" style="margin-top:32px"></div>
  <div class="table-wrap hidden" id="tableView"><table><thead><tr>
    <th data-k="Competitor Name">Competitor</th><th data-k="Platform">Platform</th><th data-k="Region">Region</th><th data-k="Ad Format">Format</th><th data-k="Status">Status</th>
    <th data-k="Started Running">Started</th><th data-k="Last Shown">Last Shown</th><th>Preview</th><th>Image</th><th>Video</th><th>Link</th><th data-k="Creative ID">Creative ID</th>
  </tr></thead><tbody id="tBody"></tbody></table></div>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="close-btn" onclick="closeLightbox()">&times;</button>
  <div id="lbContent"></div>
</div>

<script>
// Phase 5.3: dashboard fetches from /api/ads — no more ads_data.js download.
// State accumulates pages on scroll; filter/sort changes reset and refetch.
const state = {
  ads: [],          // accumulated across pages (current filter)
  total: 0,         // total matching current filter (server-side count)
  stats: null,      // unfiltered top-card counts (server-computed)
  breakdown: null,  // unfiltered per-competitor (server-computed)
  competitors: [],  // dropdown values (one-time)
  offset: 0,
  limit: 200,
  sortKey: 'last_shown',
  sortDir: 'desc',
  loading: false,
  initialized: false,
};

// Display-name → SQL column name. Matches SORT_WHITELIST in api/ads.py.
const SORT_COL = {
  'Last Shown': 'last_shown',
  'Started Running': 'started_running',
  'seen_in_batches': 'seen_in_batches',
  'Date Collected': 'date_collected',
};

// ── Helpers ──
function cleanImageUrl(raw) {
  if (!raw) return '';
  // Extract src from <img> tag
  const m = raw.match(/src=["']([^"'>]+)/);
  if (m) raw = m[1];
  // Skip non-image URLs
  if (raw.includes('sadbundle') || raw.endsWith('.html') || raw.endsWith('.js')) return '';
  // Google Ads images (both /simgad/ and /archive/simgad/)
  if (raw.includes('simgad') || raw.includes('tpc.googlesyndication')) return raw;
  // YouTube thumbnails (video ad previews)
  if (raw.includes('ytimg.com')) return raw;
  // Google-hosted images (lh3)
  if (raw.includes('lh3.googleusercontent.com')) return raw;
  // 2mdn.net hosted images (Cash App, etc.)
  if (raw.includes('2mdn.net')) return raw;
  // gstatic.com hosted images
  if (raw.includes('gstatic.com')) return raw;
  // Meta Ads images (Facebook CDN)
  if (raw.includes('fbcdn.net') || raw.includes('facebook.com') || raw.includes('scontent')) return raw;
  // LinkedIn Ads images (media.licdn.com / dms.licdn.com). LinkedIn URLs
  // don't end in .jpg/.png so they'd miss the extension check below.
  if (raw.includes('licdn.com')) return raw;
  // Any direct image file URL
  if (/\.(png|jpg|jpeg|gif|webp)(\?|$)/i.test(raw)) return raw;
  return '';
}
function isVideoUrlExpired(url) {
  if (!url) return true;
  const m = url.match(/expire=(\d+)/);
  if (!m) return false;
  return parseInt(m[1]) * 1000 < Date.now();
}
function cleanVideoUrl(raw) {
  if (!raw) return '';
  raw = raw.replace(/&amp;/g, '&');
  if (raw.startsWith('//')) raw = 'https:' + raw;
  return raw;
}
function fb(f){return `<span class="badge badge-${f==='Video'?'video':f==='Image'?'image':'text'}">${f}</span>`}
function rb(r){return `<span class="badge badge-${r.toLowerCase()}">${r}</span>`}
function platformBadge(p){
  // Color matches the platform's brand. Anything we don't recognize falls
  // back to Google's blue so missing/empty Platform doesn't render as text.
  if(p==='Meta Ads')     return '<span class="badge" style="background:rgba(167,139,250,.15);color:#a78bfa">META</span>';
  if(p==='LinkedIn Ads') return '<span class="badge" style="background:rgba(10,102,194,.18);color:#7eb6ff">LINKEDIN</span>';
  return '<span class="badge" style="background:rgba(59,130,246,.15);color:#60a5fa">GOOGLE</span>';
}

function openLightbox(imgUrl, vidUrl, previewUrl) {
  const lb = document.getElementById('lightbox');
  const c = document.getElementById('lbContent');
  if (imgUrl) {
    c.innerHTML = `<img src="${imgUrl}" alt="Ad creative">`;
  } else if (vidUrl) {
    c.innerHTML = `<video src="${vidUrl}" controls autoplay style="max-width:90%;max-height:90%;border-radius:8px"></video>`;
  } else if (previewUrl) {
    window.open(previewUrl, '_blank');
    return;
  } else {
    return;
  }
  lb.classList.add('open');
}
function closeLightbox() {
  const lb = document.getElementById('lightbox');
  lb.classList.remove('open');
  document.getElementById('lbContent').innerHTML = '';
}

// ── Render ──
function renderStats(){
  const s = state.stats || {};
  const t = s.total||0, act=s.active||0, inact=s.inactive||0;
  const v=s.video||0, im=s.image||0, n=s.new_this_week||0;
  const gAds=s.google||0, mAds=s.meta||0;
  const c=state.competitors.length;
  const totActive = act || 1; // for percentages on active-row
  document.getElementById('statsRow').innerHTML=`
    <div class="stat-card"><div class="label">Total Ads</div><div class="value">${t}</div><div class="sub">${c} competitors</div></div>
    <div class="stat-card"><div class="label">Active</div><div class="value" style="color:var(--green)">${act}</div><div class="sub">${inact} inactive</div></div>
    <div class="stat-card"><div class="label">Google Ads</div><div class="value" style="color:#60a5fa">${gAds}</div><div class="sub">${Math.round(100*gAds/totActive)}% of active</div></div>
    <div class="stat-card"><div class="label">Meta Ads</div><div class="value" style="color:#a78bfa">${mAds}</div><div class="sub">${Math.round(100*mAds/totActive)}% of active</div></div>
    <div class="stat-card"><div class="label">Video</div><div class="value" style="color:#f87171">${v}</div><div class="sub">${Math.round(100*v/totActive)}% of active</div></div>
    <div class="stat-card"><div class="label">Image</div><div class="value" style="color:#60a5fa">${im}</div><div class="sub">${Math.round(100*im/totActive)}% of active</div></div>
    <div class="stat-card"><div class="label">New This Week</div><div class="value" style="color:var(--green)">${n}</div><div class="sub">first seen</div></div>`;
  document.getElementById('lastUpdated').textContent = s.last_scraped ? 'Last scraped: '+s.last_scraped : '';
}

function renderBreakdown(){
  const all = state.breakdown || [];
  if (!all.length) { document.getElementById('breakdown').innerHTML=''; return; }
  const mx = Math.max(...all.map(c=>c.total), 1);
  const gcc = all.filter(c => c.category !== 'Global');
  const global = all.filter(c => c.category === 'Global');
  function renderCards(cards){return cards.map(c=>{
    const platBadge=platformBadge(c.platform);
    return `
    <div class="breakdown-card">
      <div class="name">${c.name} ${platBadge}</div>
      <div class="bar-row">Video: ${c.video}<div class="bar bar-v"><div class="fill" style="width:${c.video/mx*100}%"></div></div></div>
      <div class="bar-row">Image: ${c.image}<div class="bar bar-i"><div class="fill" style="width:${c.image/mx*100}%"></div></div></div>
      <div style="margin-top:6px;font-size:13px;font-weight:600">${c.total} total</div>
    </div>`}).join('')}
  document.getElementById('breakdown').innerHTML=
    '<h3 class="section" style="grid-column:1/-1;margin-top:0">GCC</h3>'+renderCards(gcc)+
    '<h3 class="section" style="grid-column:1/-1;margin-top:16px">Global</h3>'+renderCards(global);
}

function renderGrid(ads, append){
  const html = ads.map(ad=>{
    const img=cleanImageUrl(ad['Image URL']);
    const vid=cleanVideoUrl(ad['Video URL']);
    const vidOk=vid&&!isVideoUrlExpired(vid);
    const preview=ad['Ad Preview URL']||'';
    const isNew=ad['New This Week']==='NEW';
    let media='';
    const fmtIcon = ad['Ad Format']==='Video' ? '\u25B6' : ad['Ad Format']==='Image' ? '\u{1F5BC}' : '\u{1F4DD}';
    const fmtColor = ad['Ad Format']==='Video' ? '#f87171' : ad['Ad Format']==='Image' ? '#60a5fa' : '#facc15';
    const isVideo=ad['Ad Format']==='Video';
    if(img){
      // Show image thumbnail — for video ads, add play overlay
      media=`<img loading="lazy" src="${img}" alt="Ad" onerror="this.parentElement.innerHTML='<div class=no-preview><div style=font-size:32px;margin-bottom:6px>${fmtIcon}</div><div>${ad['Ad Format']} ad</div></div>'">`;
      if(isVideo) media+=`<div class="play-overlay"></div>`;
    } else if(ad['Screenshot']){
      // Show screenshot taken from Transparency Center
      media=`<img loading="lazy" src="${ad['Screenshot']}" alt="Ad screenshot" onerror="this.parentElement.innerHTML='<div class=no-preview><div style=font-size:32px;margin-bottom:6px>${fmtIcon}</div><div>${ad['Ad Format']} ad</div></div>'">`;
      if(isVideo) media+=`<div class="play-overlay"></div>`;
    } else if(ad['Embed URL']){
      // Trust upstream classification — pipeline only stores iframeable URLs
      // here (sadbundle, content.html, displayads-formats.googleusercontent.com).
      media=`<iframe src="${ad['Embed URL']}" loading="lazy" sandbox="allow-scripts allow-same-origin" scrolling="no"></iframe>`;
    } else {
      const viewLabel=ad['Platform']==='Meta Ads'?'View on Meta':'View on Google';
      media=`<div class="no-preview" style="height:${ad['Status']==='Active'?'220':'80'}px"><div style="font-size:${ad['Status']==='Active'?'36':'12'}px;${ad['Status']==='Active'?'margin-bottom:8px;color:'+fmtColor:'color:var(--muted)'}">${ad['Status']==='Active'?fmtIcon:''}</div>${ad['Status']==='Active'?'<div style="font-size:14px;font-weight:500">'+ad['Ad Format']+' Ad</div>':''}<div style="margin-top:8px;font-size:11px"><a href="${preview}" target="_blank" style="color:var(--accent-l);text-decoration:none">${viewLabel} &rarr;</a></div></div>`;
    }
    // Click: image opens lightbox, video ads open preview URL (Meta CDN videos require auth)
    const clickAction = isVideo
      ? `onclick="window.open('${preview.replace(/'/g,"\\'")}','_blank')"`
      : (img ? `onclick="openLightbox('${img}','','${preview}')"` : `onclick="window.open('${preview.replace(/'/g,"\\'")}','_blank')"`);
    return `<div class="ad-card">
      <div class="media" ${clickAction}>${media}</div>
      <div class="info">
        <div class="top-row"><span class="competitor">${ad['Competitor Name']}</span>${rb(ad['Region'])}</div>
        <div class="tags">${fb(ad['Ad Format'])}${platformBadge(ad['Platform'])}${ad['Category']==='Global'?' <span class="badge" style="background:rgba(168,85,247,.15);color:#c084fc">GLOBAL</span>':''}${isNew?' <span class="badge badge-new">NEW</span>':''}${(ad['Status']||'Active')==='Inactive'?' <span class="badge badge-inactive">INACTIVE</span>':''}</div>
        <div class="details">${ad['Started Running']?'Started: '+ad['Started Running']+' | ':''}Last shown: ${ad['Last Shown']||'N/A'}<br>${ad['Advertiser Name (Transparency Center)']||''}<br>
          <a href="${preview}" target="_blank">${ad['Platform']==='Meta Ads'?'Ad Library':'Transparency Center'}</a>${isVideo&&vid?' | <a href="'+preview+'" target="_blank">Video</a>':''}</div>
      </div></div>`;
  }).join('');
  const el = document.getElementById('gridView');
  if (append) el.insertAdjacentHTML('beforeend', html); else el.innerHTML = html;
}

function renderTable(ads, append){
  const html = ads.map(ad=>{
    const img=cleanImageUrl(ad['Image URL']);
    const vid=cleanVideoUrl(ad['Video URL']);
    const preview=ad['Ad Preview URL']||'';
    const isNew=ad['New This Week']==='NEW';
    const plat=ad['Platform']||'Google Ads';
    const platBadge=platformBadge(plat);
    return `<tr>
      <td><strong>${ad['Competitor Name']}</strong>${isNew?' <span class="badge badge-new">NEW</span>':''}</td>
      <td>${platBadge}</td><td>${rb(ad['Region'])}</td><td>${fb(ad['Ad Format'])}</td><td>${(ad['Status']||'Active')==='Active'?'<span style="color:var(--green)">Active</span>':'<span style="color:var(--muted)">Inactive</span>'}</td><td>${ad['Started Running']||''}</td><td>${ad['Last Shown']||''}</td>
      <td>${img?`<img class="thumb" loading="lazy" src="${img}" onclick="openLightbox('${img}','','')" style="cursor:zoom-in" onerror="this.style.display='none'">`:`<a href="${preview}" target="_blank" style="font-size:11px">Preview</a>`}</td>
      <td>${img?`<a href="${img}" target="_blank">View</a>`:'-'}</td>
      <td>${vid?`<a href="${vid}" target="_blank">Play</a>`:'-'}</td>
      <td><a href="${preview}" target="_blank">View</a></td>
      <td style="font-size:11px;color:var(--muted)">${ad['Creative ID']||''}</td></tr>`;
  }).join('');
  const el = document.getElementById('tBody');
  if (append) el.insertAdjacentHTML('beforeend', html); else el.innerHTML = html;
}

// ── API loader ──
function buildQuery(){
  const q = new URLSearchParams();
  const map = {fCat:'category', fComp:'competitor', fReg:'region', fFmt:'format',
               fPlat:'platform', fStatus:'status', fFrom:'from', fTo:'to', fSearch:'search'};
  for (const [id, name] of Object.entries(map)) {
    const v = (document.getElementById(id).value || '').trim();
    if (v) q.set(name, v);
  }
  q.set('limit', state.limit);
  q.set('offset', state.offset);
  q.set('sort', state.sortKey);
  q.set('dir', state.sortDir);
  return q.toString();
}

async function loadFromApi(reset){
  if (state.loading) return;
  state.loading = true;
  if (reset) { state.offset = 0; state.ads = []; }
  try {
    const resp = await fetch('/api/ads?' + buildQuery());
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const data = await resp.json();
    if (reset) state.ads = data.ads; else state.ads = state.ads.concat(data.ads);
    state.offset += data.ads.length;
    state.total = data.total;
    state.stats = data.stats;
    state.breakdown = data.breakdown;
    if (!state.competitors.length) state.competitors = data.competitors || [];
    document.getElementById('cnt').textContent = state.total;
    renderStats();
    if (reset) renderBreakdown();
    renderGrid(data.ads, !reset);
    renderTable(data.ads, !reset);
    updateSentinel();
  } catch (e) {
    document.getElementById('gridView').innerHTML =
      `<div style="grid-column:1/-1;padding:24px;color:var(--red);text-align:center">Failed to load: ${e.message}</div>`;
  } finally {
    state.loading = false;
  }
}

// ── Pagination sentinel (IntersectionObserver) ──
let sentinelEl = null, observer = null;
function ensureSentinel(){
  if (sentinelEl) return sentinelEl;
  sentinelEl = document.createElement('div');
  sentinelEl.id = 'sentinel';
  sentinelEl.style.cssText = 'grid-column:1/-1;height:40px;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:12px';
  document.getElementById('gridView').after(sentinelEl);
  observer = new IntersectionObserver((entries)=>{
    if (entries[0].isIntersecting && !state.loading && state.offset < state.total) {
      loadFromApi(false);
    }
  }, { rootMargin: '400px' });
  observer.observe(sentinelEl);
  return sentinelEl;
}
function updateSentinel(){
  const s = ensureSentinel();
  if (state.offset < state.total) s.textContent = `Loading more… (${state.offset} / ${state.total})`;
  else s.textContent = state.total ? `All ${state.total} loaded` : '';
}

// ── Bootstrap ──
async function init(){
  // Pre-populate competitor dropdown so the UI feels populated immediately.
  // The first /api/ads call returns the canonical list; we fill on response.
  await loadFromApi(true);
  if (!state.initialized) {
    const sel = document.getElementById('fComp');
    for (const n of state.competitors) {
      const o = document.createElement('option');
      o.value = n; o.textContent = n;
      sel.appendChild(o);
    }
    state.initialized = true;
  }
}
init();

// ── Filter / sort / view-toggle wiring ──
let _searchTimer;
['fCat','fComp','fReg','fFmt','fPlat','fStatus','fFrom','fTo'].forEach(id=>{
  document.getElementById(id).addEventListener('change', ()=>loadFromApi(true));
});
document.getElementById('fSearch').addEventListener('input', ()=>{
  clearTimeout(_searchTimer);
  _searchTimer = setTimeout(()=>loadFromApi(true), 300);  // debounce
});
document.getElementById('btnGrid').addEventListener('click', function(){
  this.classList.add('active'); document.getElementById('btnTable').classList.remove('active');
  document.getElementById('gridView').classList.remove('hidden');
  document.getElementById('tableView').classList.add('hidden');
});
document.getElementById('btnTable').addEventListener('click', function(){
  this.classList.add('active'); document.getElementById('btnGrid').classList.remove('active');
  document.getElementById('tableView').classList.remove('hidden');
  document.getElementById('gridView').classList.add('hidden');
});
document.querySelectorAll('th[data-k]').forEach(th => th.addEventListener('click', ()=>{
  const k = th.dataset.k;
  const col = SORT_COL[k];
  if (!col) return;  // only sortable columns are in SORT_COL
  if (state.sortKey === col) state.sortDir = state.sortDir === 'desc' ? 'asc' : 'desc';
  else { state.sortKey = col; state.sortDir = 'desc'; }
  loadFromApi(true);
}));
document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeLightbox(); });

</script>
